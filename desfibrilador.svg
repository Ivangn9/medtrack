<circle cx="156" cy="248" r="3" fill="#e8a820"/>
<circle cx="156" cy="258" r="3" fill="#e8a820"/>
<circle cx="156" cy="268" r="3" fill="#e8a820"/>
<text x="156" y="288" text-anchor="middle" font-family="monospace" font-size="6" fill="#607888">ECG</text>

<!-- Indicador batería -->
<rect x="390" y="296" width="66" height="26" rx="5" fill="#1a2838"/>
<text x="423" y="306" text-anchor="middle" font-family="monospace" font-size="6" fill="#7ee8ff">BATERÍA</text>
<!-- Barra batería -->
<rect x="396" y="308" width="48" height="8" rx="2" fill="#0a1020"/>
<rect x="396" y="308" width="40" height="8" rx="2" fill="#50c878"/>
<text x="445" y="315" font-family="monospace" font-size="5" fill="#50c878">83%</text>

