<rect x="390" y="328" width="66" height="26" rx="5" fill="#0a1e10"/>
<text x="423" y="343" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#50e878">● STANDBY</text>

<!-- LED indicador carga -->
<circle cx="390" cy="370" r="7" fill="#e88020" opacity="0.3"/>
<circle cx="390" cy="370" r="7" fill="none" stroke="#e88020" stroke-width="1.5"/>
<text x="406" y="374" font-family="monospace" font-size="6" fill="#e88020">CHARGED</text>

<!-- Puerto impresora -->
<rect x="460" y="300" width="12" height="36" rx="3" fill="#b0bcc8"/>
<text x="466" y="348" text-anchor="middle" font-family="monospace" font-size="6" fill="#607888">PRINT</text>

<!-- Etiqueta general -->
<text x="310" y="552" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#8898a8" letter-spacing="1">Desfibrilador Monitor</text>
<text x="310" y="566" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#a0b0b8">Philips HeartStart MRx</text>

