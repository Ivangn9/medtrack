<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 210 297" width="210mm" height="297mm" preserveAspectRatio="xMidYMid meet">
<defs>
<linearGradient id="hl" x1="0" y1="0" x2="1" y2="0">
 <stop offset="0" stop-color="#1a3a6b"/>
 <stop offset="0.6" stop-color="#2563eb"/>
 <stop offset="1" stop-color="#60a5fa"/>
</linearGradient>
</defs>
<!-- page base -->
<rect x="0" y="0" width="210" height="297" fill="#ffffff"/>
<!-- top accent bar -->
<rect x="0" y="0" width="210" height="2.4" fill="url(#hl)"/>
<!-- left vertical accent lines -->
<rect x="11" y="6" width="0.7" height="285" fill="#1a3a6b" opacity="0.55"/>
<rect x="13" y="6" width="0.35" height="285" fill="#1a3a6b" opacity="0.28"/>
<!-- decorative thin arcs top-right corner -->
<g fill="none" stroke="#1a3a6b" opacity="0.10">
 <path d="M210,12 A60,60 0 0,1 150,72" stroke-width="0.5"/>
 <path d="M210,26 A78,78 0 0,1 132,104" stroke-width="0.4"/>
 <path d="M210,44 A98,98 0 0,1 112,142" stroke-width="0.35"/>
</g>
<!-- header underline -->
<rect x="20" y="28" width="170" height="0.9" fill="url(#hl)"/>
<!-- ===== faint equipment line-art (watermark) ===== -->
<g fill="none" stroke="#1a3a6b" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.055">
 <!-- RM / resonador (center-left) -->
 <g transform="translate(40,150)">
  <rect x="0" y="0" width="44" height="46" rx="8"/>
  <circle cx="22" cy="23" r="15"/>
  <circle cx="22" cy="23" r="8"/>
  <rect x="-26" y="30" width="30" height="4" rx="1.5"/>
  <line x1="6" y1="46" x2="6" y2="50"/>
  <line x1="38" y1="46" x2="38" y2="50"/>
 </g>
 <!-- TC scanner (top-right) -->
 <g transform="translate(150,72)">
  <rect x="0" y="0" width="34" height="40" rx="5"/>
  <circle cx="17" cy="20" r="12"/>
  <circle cx="17" cy="20" r="6"/>
  <line x1="-20" y1="34" x2="17" y2="34"/>
  <rect x="-24" y="32.5" width="5" height="3" rx="1"/>
  <line x1="3" y1="40" x2="3" y2="44"/>
  <line x1="31" y1="40" x2="31" y2="44"/>
 </g>
 <!-- RX (bottom-left) -->
 <g transform="translate(32,236)">
  <line x1="0" y1="0" x2="0" y2="34"/>
  <line x1="0" y1="6" x2="26" y2="6"/>
  <rect x="22" y="6" width="10" height="8" rx="1.5"/>
  <line x1="27" y1="14" x2="27" y2="20"/>
  <rect x="14" y="24" width="32" height="3" rx="1.2"/>
  <line x1="19" y1="27" x2="19" y2="34"/>
  <line x1="41" y1="27" x2="41" y2="34"/>
 </g>
 <!-- Ecografo (bottom-right) -->
 <g transform="translate(146,206)">
  <rect x="6" y="0" width="26" height="18" rx="2.5"/>
  <line x1="19" y1="18" x2="19" y2="24"/>
  <rect x="2" y="24" width="34" height="22" rx="3"/>
  <line x1="6" y1="31" x2="32" y2="31"/>
  <line x1="6" y1="36" x2="26" y2="36"/>
  <circle cx="8" cy="50" r="3"/>
  <circle cx="30" cy="50" r="3"/>
  <path d="M40,9 q7,3 5,12"/>
 </g>
</g>
<!-- large faint vertical CIMA monogram on far left -->
<text x="7.5" y="170" transform="rotate(-90 7.5,170)" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="900" fill="#1a3a6b" opacity="0.045" letter-spacing="6">CIMA</text>
<!-- footer -->
<rect x="20" y="283" width="170" height="0.6" fill="#1a3a6b" opacity="0.4"/>
<text x="105" y="289" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="2.7" letter-spacing="1.2" fill="#1a3a6b" opacity="0.45">DIAGNÓSTICO POR IMAGEN · INVESTIGACIONES AVANZADAS</text>
</svg>