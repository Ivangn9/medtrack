  <rect x="548" y="195" width="60" height="30" rx="4" fill="#c8d4de"/>
  <!-- Base resonador -->
  <rect x="50" y="398" width="500" height="12" rx="4" fill="#b0bcc8"/>
</g>

<!-- Glow luz azul resonador -->
<ellipse cx="290" cy="240" rx="180" ry="160" fill="url(#mriGlow)" opacity="0.5"/>

