<svg width="100%" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
<title>Workstation MRI - Cuerpo con imágenes</title>
<defs>
  <radialGradient id="bg" cx="35%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#e8eef4"/>
    <stop offset="60%" stop-color="#c8d4de"/>
    <stop offset="100%" stop-color="#a8b8c8"/>
  </radialGradient>
  <radialGradient id="mriGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#d8e8f4" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#d8e8f4" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="monBase" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1a1e26"/>
    <stop offset="100%" stop-color="#0c0e14"/>
  </linearGradient>
  <linearGradient id="monFrame" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2a2e38"/>
    <stop offset="100%" stop-color="#16181e"/>
  </linearGradient>
  <radialGradient id="screenBg" cx="50%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#0c1420"/>
    <stop offset="100%" stop-color="#040608"/>
  </radialGradient>
  <radialGradient id="bodyGlow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#d8e8f0"/>
    <stop offset="50%" stop-color="#a0b8c8"/>
    <stop offset="100%" stop-color="#506878"/>
  </radialGradient>
  <filter id="blur">
    <feGaussianBlur stdDeviation="8"/>
  </filter>
  <filter id="blurMid">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
  <filter id="shadow">
    <feDropShadow dx="12" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
  </filter>
  <linearGradient id="kbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#282c34"/>
    <stop offset="100%" stop-color="#1a1e24"/>
  </linearGradient>
</defs>

<!-- ============================================================ -->
<!--   FONDO - SALA CON RESONADOR DIFUMINADO                    -->
<!-- ============================================================ -->
<rect x="0" y="0" width="900" height="560" fill="url(#bg)"/>

<!-- Suelo -->
<rect x="0" y="400" width="900" height="160" fill="#c8d4de" opacity="0.5"/>
