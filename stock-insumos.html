  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass:rgba(255,255,255,.20);
      --glass2:rgba(255,255,255,.82);
      --glass-tint:rgba(232,234,244,.58);
      --glass-border:rgba(255,255,255,.72);
      --glass-border-top:rgba(255,255,255,1.0);
      --blur:saturate(320%) contrast(108%) brightness(110%) blur(30px);
      --blur-heavy:saturate(360%) contrast(110%) brightness(112%) blur(44px);
      --r-sm:14px; --r-md:18px; --r-lg:24px; --r-xl:30px; --r-pill:50px;
      --accent:#0071e3; --accent2:#0058b0;
      --red:#ff3b30; --orange:#ff9500; --green:#34c759; --purple:#af52de;
      --bg:#e2e4f0;
      --text:#1c1c1e; --text2:#3a3a3c; --text3:#8e8e93;
      --sep:rgba(60,60,67,.08);
      --spring:cubic-bezier(0.34,1.56,0.64,1);
      --spring-fast:cubic-bezier(0.34,1.4,0.64,1);
      --ease-out:cubic-bezier(0.16,1,0.3,1);
      --lg-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 16px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.06),inset 0 1.5px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(0,0,0,.04);
      --lg-shadow-float:0 2px 4px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.08),0 24px 64px rgba(0,0,0,.08),inset 0 1.5px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(0,0,0,.04);
      --lg-shimmer:linear-gradient(135deg,rgba(255,215,235,.14) 0%,rgba(215,195,255,.10) 30%,rgba(185,225,255,.09) 60%,rgba(205,255,220,.07) 100%);
      --specular:linear-gradient(180deg,rgba(255,255,255,.75) 0%,rgba(255,255,255,.25) 45%,rgba(255,255,255,.0) 68%);

      /* Legacy aliases for JS-generated HTML */
      --text-primary: var(--text);
      --text-secondary: var(--text2);
      --text-tertiary: var(--text3);
      --blue: var(--accent);
      --teal: var(--green);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #d6e8f5; color: var(--text); min-height: 100vh; min-height: 100dvh;
      overscroll-behavior: none; -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    /* Fondo fijo — funciona en iOS/Safari donde background-attachment:fixed falla */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: #d6e8f5 url('Fondo.png') center center / cover;
    }
    body::after { display: none; }

    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg); }
      50%  { filter: hue-rotate(8deg); }
      100% { filter: hue-rotate(-6deg); }
    }

    /* ── LIQUID GLASS CARD ── */
    .gc {
      background: rgba(255,255,255,.16);
      -webkit-backdrop-filter: saturate(180%) contrast(104%) brightness(106%) blur(20px);
      backdrop-filter: saturate(180%) contrast(104%) brightness(106%) blur(20px);
      border: 1.5px solid rgba(255,255,255,.90);
      border-top-color: rgba(255,255,255,1.0);
      border-radius: var(--r-lg);
      box-shadow:
        0 0 0 1px rgba(180,200,255,.28),
        0 2px 8px rgba(140,160,220,.12),
        0 8px 28px rgba(140,160,220,.10),
        0 20px 48px rgba(0,0,0,.06),
        inset 0 2.5px 0 rgba(255,255,255,1.0),
        inset 0 0 0 1px rgba(255,255,255,.55),
        inset 0 -1px 4px rgba(0,0,0,.03);
      position: relative; overflow: hidden;
      transition: transform .32s var(--spring), box-shadow .28s var(--ease-out);
    }
