<svg width="100%" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
<title>UPS - Sistema de Alimentación Ininterrumpida</title>
<defs>
  <linearGradient id="frontFace" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f8fafb"/>
    <stop offset="60%" stop-color="#edf1f5"/>
    <stop offset="100%" stop-color="#d8e0e8"/>
  </linearGradient>
  <linearGradient id="sideFace" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#d0d8e0"/>
    <stop offset="100%" stop-color="#b8c4cc"/>
  </linearGradient>
  <linearGradient id="topFace" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#eef2f6"/>
    <stop offset="100%" stop-color="#d4dce4"/>
  </linearGradient>
  <linearGradient id="panelDark" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1a2030"/>
    <stop offset="100%" stop-color="#0e1420"/>
  </linearGradient>
  <linearGradient id="ventStripe" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#c8d4de"/>
    <stop offset="100%" stop-color="#b0bcc8"/>
  </linearGradient>
  <radialGradient id="screenGrad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#0e2040"/>
    <stop offset="100%" stop-color="#060c18"/>
  </radialGradient>
  <filter id="shadow">
    <feDropShadow dx="8" dy="12" stdDeviation="18" flood-color="#8090a0" flood-opacity="0.3"/>
  </filter>
</defs>

<g filter="url(#shadow)">

