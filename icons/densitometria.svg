<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="dmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dmGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="dmBeam" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#dmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#dmShine)"/>

  <!-- C-arm / scanning bridge -->
  <path d="M70 168 L70 100 Q70 70 100 70 L156 70 Q186 70 186 100 L186 168"
        fill="none" stroke="url(#dmGlass)" stroke-width="14" stroke-linecap="round"/>
  <path d="M70 168 L70 100 Q70 70 100 70 L156 70 Q186 70 186 100 L186 168"
        fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="4" stroke-linecap="round"/>

  <!-- Scanner head (mounted underneath bridge top) -->
  <rect x="100" y="78" width="56" height="22" rx="5"
        fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,1)" stroke-width="2"/>
  <circle cx="128" cy="106" r="6" fill="rgba(255,255,255,0.95)"/>

  <!-- Scan beam down to bed -->
  <polygon points="128,112 110,176 146,176" fill="url(#dmBeam)" opacity="0.75"/>

  <!-- Patient bed / table -->
  <rect x="20" y="176" width="216" height="26" rx="8"
        fill="rgba(255,255,255,0.18)" stroke="url(#dmGlass)" stroke-width="5"/>
  <rect x="30" y="184" width="196" height="10" rx="4" fill="rgba(255,255,255,0.55)"/>

  <!-- Spine / vertebrae icon on bed surface -->
  <g stroke="rgba(255,255,255,0.95)" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M118 186 L138 192"/>
    <path d="M138 192 L118 198"/>
    <path d="M118 198 L138 204"/>
  </g>
  <g fill="rgba(255,255,255,0.85)">
    <circle cx="118" cy="186" r="3.5"/>
    <circle cx="138" cy="192" r="3.5"/>
    <circle cx="118" cy="198" r="3.5"/>
    <circle cx="138" cy="204" r="3.5"/>
  </g>

  <!-- Table legs / base -->
  <rect x="34" y="202" width="14" height="32" rx="3" fill="rgba(255,255,255,0.55)"/>
  <rect x="208" y="202" width="14" height="32" rx="3" fill="rgba(255,255,255,0.55)"/>

  <!-- Density graph badge top-left -->
  <g opacity="0.85">
    <rect x="20" y="20" width="44" height="32" rx="6" fill="rgba(255,255,255,0.85)"/>
    <path d="M28 44 L36 36 L42 40 L52 28 L58 32"
          fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
