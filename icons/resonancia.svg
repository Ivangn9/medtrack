<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rmGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- Magnetic field lines -->
  <g opacity=".35" fill="none" stroke="white" stroke-linecap="round">
    <path d="M50 32 Q128 12 206 32" stroke-width="2.5"/>
    <path d="M40 14 Q128 -2 216 14" stroke-width="2"/>
  </g>

  <!-- Scanner housing -->
  <rect x="36" y="42" width="184" height="142" rx="26"
        fill="rgba(255,255,255,0.18)" stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Top highlight -->
  <rect x="42" y="48" width="172" height="22" rx="14"
        fill="rgba(255,255,255,0.22)"/>

  <!-- Bore outer ring -->
  <circle cx="128" cy="112" r="52"
          fill="rgba(255,255,255,0.10)"
          stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Bore inner deep ring -->
  <circle cx="128" cy="112" r="36"
          fill="rgba(0,0,0,0.30)"
          stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>

  <!-- "RM" badge top-right -->
  <circle cx="198" cy="72" r="19" fill="rgba(255,255,255,0.95)"/>
  <text x="198" y="79" text-anchor="middle"
        font-family="-apple-system,Arial,sans-serif"
        font-size="18" font-weight="900" fill="#4f46e5" letter-spacing="-1">RM</text>

  <!-- ── PATIENT CAMILLA — hospital stretcher (horizontal, side view) ── -->
  <!-- Mattress (long rounded capsule) -->
  <rect x="32" y="198" width="192" height="22" rx="11"
        fill="rgba(255,255,255,0.92)"
        stroke="url(#rmGlass)" stroke-width="3"/>
  <!-- Head pillow at left end -->
  <rect x="40" y="202" width="44" height="14" rx="6"
        fill="rgba(255,255,255,1)"/>
  <line x1="46" y1="206" x2="76" y2="206" stroke="#6366f1" stroke-width="1.5" opacity=".5"/>
  <line x1="46" y1="212" x2="68" y2="212" stroke="#6366f1" stroke-width="1.5" opacity=".4"/>

  <!-- Mattress segment divisions -->
  <line x1="100" y1="200" x2="100" y2="218" stroke="rgba(99,102,241,0.30)" stroke-width="1.5"/>
  <line x1="160" y1="200" x2="160" y2="218" stroke="rgba(99,102,241,0.30)" stroke-width="1.5"/>

  <!-- Bed support legs -->
  <rect x="58" y="220" width="10" height="22" rx="2"
        fill="rgba(255,255,255,0.75)"/>
  <rect x="188" y="220" width="10" height="22" rx="2"
        fill="rgba(255,255,255,0.75)"/>

  <!-- Wheels -->
  <circle cx="63" cy="246" r="6" fill="rgba(255,255,255,0.95)"/>
  <circle cx="63" cy="246" r="2.5" fill="#6366f1"/>
  <circle cx="193" cy="246" r="6" fill="rgba(255,255,255,0.95)"/>
  <circle cx="193" cy="246" r="2.5" fill="#6366f1"/>
</svg>
