<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rmGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- Field lines (magnetic) -->
  <g opacity=".35" fill="none" stroke="white" stroke-linecap="round">
    <path d="M50 50 Q128 30 206 50" stroke-width="2.5"/>
    <path d="M40 30 Q128 8 216 30" stroke-width="2"/>
  </g>

  <!-- Scanner housing (front view) -->
  <rect x="36" y="62" width="184" height="142" rx="26"
        fill="rgba(255,255,255,0.18)" stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Housing top highlight -->
  <rect x="42" y="68" width="172" height="22" rx="14"
        fill="rgba(255,255,255,0.22)"/>

  <!-- Bore (outer ring) -->
  <circle cx="128" cy="130" r="52"
          fill="rgba(255,255,255,0.10)"
          stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Bore (inner ring) -->
  <circle cx="128" cy="130" r="36"
          fill="rgba(0,0,0,0.18)"
          stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>

  <!-- Patient head silhouette in bore -->
  <circle cx="128" cy="130" r="16" fill="rgba(255,255,255,0.55)"/>
  <circle cx="128" cy="126" r="11" fill="rgba(255,255,255,0.85)"/>

  <!-- Patient bed/table -->
  <rect x="90" y="186" width="76" height="18" rx="6" fill="rgba(255,255,255,0.55)"/>
  <rect x="40" y="206" width="176" height="12" rx="5" fill="rgba(255,255,255,0.45)"/>

  <!-- Tiny "M" badge accent on housing -->
  <circle cx="190" cy="92" r="13" fill="rgba(255,255,255,0.85)"/>
  <text x="190" y="98" text-anchor="middle"
        font-family="-apple-system,Arial,sans-serif"
        font-size="16" font-weight="900" fill="#4f46e5">M</text>
</svg>
