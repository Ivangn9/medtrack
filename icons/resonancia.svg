<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rmGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- Field lines (magnetic) -->
  <g opacity=".35" fill="none" stroke="white" stroke-linecap="round">
    <path d="M50 42 Q128 22 206 42" stroke-width="2.5"/>
    <path d="M40 22 Q128 2 216 22" stroke-width="2"/>
  </g>

  <!-- Scanner housing -->
  <rect x="36" y="54" width="184" height="138" rx="26"
        fill="rgba(255,255,255,0.18)" stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Housing top highlight -->
  <rect x="42" y="60" width="172" height="22" rx="14"
        fill="rgba(255,255,255,0.22)"/>

  <!-- Bore (outer ring) -->
  <circle cx="128" cy="122" r="52"
          fill="rgba(255,255,255,0.10)"
          stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Bore (inner deep ring) -->
  <circle cx="128" cy="122" r="36"
          fill="rgba(0,0,0,0.30)"
          stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>

  <!-- Patient camilla — perspective trapezoid coming forward from bore -->
  <path d="M 104 192
           L 152 192
           L 184 240
           L 72 240 Z"
        fill="rgba(255,255,255,0.65)"
        stroke="url(#rmGlass)" stroke-width="5"
        stroke-linejoin="round"/>
  <!-- Camilla top edge highlight -->
  <rect x="104" y="188" width="48" height="6" rx="3" fill="rgba(255,255,255,0.95)"/>
  <!-- Camilla mattress lines (perspective) -->
  <line x1="92" y1="210" x2="164" y2="210" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <line x1="82" y1="226" x2="174" y2="226" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

  <!-- "RM" badge top-right -->
  <circle cx="200" cy="84" r="19" fill="rgba(255,255,255,0.95)"/>
  <text x="200" y="91" text-anchor="middle"
        font-family="-apple-system,Arial,sans-serif"
        font-size="18" font-weight="900" fill="#4f46e5" letter-spacing="-1">RM</text>
</svg>
