<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rmBoreDeep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.20)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- Outer gantry housing — domed arch with flared feet -->
  <path d="M36 214
           L36 134
           Q36 32 128 32
           Q220 32 220 134
           L220 214
           L182 214
           L182 134
           Q182 80 128 80
           Q74 80 74 134
           L74 214
           Z"
        fill="rgba(255,255,255,0.18)"
        stroke="white" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Inner bore opening (deep circular hole) -->
  <circle cx="128" cy="124" r="44" fill="url(#rmBoreDeep)"/>
  <circle cx="128" cy="124" r="44" fill="none"
          stroke="white" stroke-width="6"/>

  <!-- Top indicator dashes (control LEDs above bore) -->
  <rect x="106" y="64" width="18" height="6" rx="3" fill="white"/>
  <rect x="132" y="64" width="18" height="6" rx="3" fill="white"/>

  <!-- Side control panel (2x2 dots on left side of housing) -->
  <g fill="white">
    <circle cx="56" cy="124" r="4.5"/>
    <circle cx="70" cy="124" r="4.5"/>
    <circle cx="56" cy="140" r="4.5"/>
    <circle cx="70" cy="140" r="4.5"/>
  </g>

  <!-- Patient table — perspective trapezoid coming forward from bore -->
  <path d="M100 156
           L156 156
           L186 214
           L70 214
           Z"
        fill="rgba(255,255,255,0.60)"
        stroke="white" stroke-width="7"
        stroke-linejoin="round"/>

  <!-- Table top edge highlight (where it meets the bore) -->
  <rect x="100" y="156" width="56" height="6" rx="3" fill="white" opacity="0.85"/>

  <!-- Bed base / cushion bar -->
  <rect x="62" y="214" width="132" height="14" rx="3"
        fill="rgba(255,255,255,0.85)"
        stroke="white" stroke-width="5"/>

  <!-- Pedestal foot -->
  <rect x="106" y="228" width="44" height="8" rx="2"
        fill="rgba(255,255,255,0.85)"
        stroke="white" stroke-width="4"/>
</svg>
