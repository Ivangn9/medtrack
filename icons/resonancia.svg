<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rmBoreDeep" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.20)"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- ── OUTER HOUSING ── dome with integrated wide base feet -->
  <path d="M 30 218
           L 30 196
           Q 30 188 42 188
           L 56 188
           L 56 132
           Q 56 36 128 36
           Q 200 36 200 132
           L 200 188
           L 214 188
           Q 226 188 226 196
           L 226 218
           L 30 218 Z"
        fill="rgba(255,255,255,0.18)"
        stroke="white" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── INNER ARCH ── concentric tunnel mouth around the bore -->
  <path d="M 80 184
           L 80 134
           Q 80 78 128 78
           Q 176 78 176 134
           L 176 184"
        fill="none"
        stroke="white" stroke-width="6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── BORE ── deep dark circular opening -->
  <circle cx="128" cy="128" r="34" fill="url(#rmBoreDeep)"/>
  <circle cx="128" cy="128" r="34" fill="none"
          stroke="white" stroke-width="6"/>

  <!-- Top LEDs inside dome -->
  <rect x="108" y="84" width="16" height="6" rx="3" fill="white"/>
  <rect x="132" y="84" width="16" height="6" rx="3" fill="white"/>

  <!-- Side control panel (2×2 dots on left of dome) -->
  <g fill="white">
    <circle cx="64" cy="120" r="3.5"/>
    <circle cx="74" cy="120" r="3.5"/>
    <circle cx="64" cy="132" r="3.5"/>
    <circle cx="74" cy="132" r="3.5"/>
  </g>

  <!-- ── PATIENT BED ── perspective trapezoid coming forward from bore -->
  <path d="M 88 184
           L 168 184
           L 196 218
           L 60 218 Z"
        fill="rgba(255,255,255,0.55)"
        stroke="white" stroke-width="7"
        stroke-linejoin="round"/>

  <!-- Bed top edge highlight -->
  <rect x="88" y="180" width="80" height="6" rx="3" fill="white"/>

  <!-- Base bar -->
  <rect x="50" y="218" width="156" height="14" rx="3"
        fill="rgba(255,255,255,0.88)"
        stroke="white" stroke-width="5"/>

  <!-- Pedestal foot -->
  <rect x="104" y="232" width="48" height="12" rx="2"
        fill="rgba(255,255,255,0.88)"
        stroke="white" stroke-width="4"/>
</svg>
