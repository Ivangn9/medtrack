<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rmGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="rmBore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.20)"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- Magnetic field arcs (top) -->
  <g opacity=".40" fill="none" stroke="white" stroke-linecap="round">
    <path d="M30 50 Q128 28 226 50" stroke-width="2.5"/>
    <path d="M50 28 Q128 8 206 28" stroke-width="2"/>
  </g>

  <!-- Magnet body — side profile, horizontal cylinder -->
  <rect x="62" y="76" width="160" height="124" rx="32"
        fill="rgba(255,255,255,0.20)" stroke="url(#rmGlass)" stroke-width="5"/>
  <!-- Body top highlight -->
  <rect x="78" y="84" width="132" height="16" rx="8" fill="rgba(255,255,255,0.28)"/>
  <!-- Body side vents/panels (gives cylindrical depth feel) -->
  <g opacity=".55" stroke="white" stroke-linecap="round" fill="none" stroke-width="2">
    <line x1="184" y1="120" x2="208" y2="120"/>
    <line x1="184" y1="138" x2="208" y2="138"/>
    <line x1="184" y1="156" x2="208" y2="156"/>
    <line x1="184" y1="174" x2="208" y2="174"/>
  </g>

  <!-- Patient bed — extends from the bore out to the left -->
  <rect x="6" y="156" width="78" height="16" rx="5" fill="rgba(255,255,255,0.60)"/>
  <rect x="6" y="172" width="78" height="8" rx="3" fill="rgba(255,255,255,0.45)"/>
  <!-- Bed support legs -->
  <rect x="14" y="180" width="6" height="22" rx="2" fill="rgba(255,255,255,0.50)"/>
  <rect x="64" y="180" width="6" height="22" rx="2" fill="rgba(255,255,255,0.50)"/>

  <!-- Patient lying on bed, head going into the bore -->
  <rect x="14" y="142" width="64" height="16" rx="8" fill="rgba(255,255,255,0.88)"/>
  <!-- Head -->
  <circle cx="78" cy="150" r="11" fill="rgba(255,255,255,0.98)"/>

  <!-- Bore opening — oval cave on the front-left face of cylinder -->
  <ellipse cx="82" cy="148" rx="14" ry="44" fill="url(#rmBore)"/>
  <ellipse cx="82" cy="148" rx="14" ry="44" fill="none"
           stroke="rgba(255,255,255,0.85)" stroke-width="3"/>
  <!-- Inner depth shading -->
  <ellipse cx="86" cy="148" rx="9" ry="36" fill="rgba(0,0,0,0.18)"/>

  <!-- "M" magnet badge on the housing -->
  <circle cx="200" cy="92" r="14" fill="rgba(255,255,255,0.90)"/>
  <text x="200" y="98" text-anchor="middle"
        font-family="-apple-system,Arial,sans-serif"
        font-size="17" font-weight="900" fill="#4f46e5">M</text>
</svg>
