<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="rmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="rmShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rmBoreDeep" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.20)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#rmBg)"/>
  <rect width="256" height="256" rx="56" fill="url(#rmShine)"/>

  <!-- ── OUTER HOUSING — wide dome with narrow waist and flared feet ── -->
  <path d="M 28 218
           L 28 200
           Q 28 184 44 180
           L 64 174
           Q 76 170 76 156
           L 76 116
           Q 76 30 128 30
           Q 180 30 180 116
           L 180 156
           Q 180 170 192 174
           L 212 180
           Q 228 184 228 200
           L 228 218
           L 28 218 Z"
        fill="rgba(255,255,255,0.18)"
        stroke="white" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── INNER ARCH — second tunnel mouth around the bore ── -->
  <path d="M 90 180
           L 90 130
           Q 90 70 128 70
           Q 166 70 166 130
           L 166 180"
        fill="none"
        stroke="white" stroke-width="6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── BORE — deep dark circle in the center of inner arch ── -->
  <circle cx="128" cy="118" r="32" fill="url(#rmBoreDeep)"/>
  <circle cx="128" cy="118" r="32" fill="none"
          stroke="white" stroke-width="6"/>

  <!-- Top status LEDs (two dashes) -->
  <rect x="108" y="54" width="16" height="6" rx="3" fill="white"/>
  <rect x="132" y="54" width="16" height="6" rx="3" fill="white"/>

  <!-- Side control panel (2×2 dots on left of housing) -->
  <g fill="white">
    <circle cx="46" cy="124" r="4"/>
    <circle cx="58" cy="124" r="4"/>
    <circle cx="46" cy="138" r="4"/>
    <circle cx="58" cy="138" r="4"/>
  </g>

  <!-- ── PATIENT BED — perspective trapezoid coming forward ── -->
  <path d="M 100 180
           L 156 180
           L 184 218
           L 72 218 Z"
        fill="rgba(255,255,255,0.55)"
        stroke="white" stroke-width="7"
        stroke-linejoin="round"/>

  <!-- Bed top edge (where it meets the bore) -->
  <rect x="100" y="176" width="56" height="6" rx="3" fill="white"/>

  <!-- Base bar -->
  <rect x="54" y="218" width="148" height="14" rx="3"
        fill="rgba(255,255,255,0.88)"
        stroke="white" stroke-width="5"/>

  <!-- Pedestal foot -->
  <rect x="104" y="232" width="48" height="12" rx="2"
        fill="rgba(255,255,255,0.88)"
        stroke="white" stroke-width="4"/>
</svg>
