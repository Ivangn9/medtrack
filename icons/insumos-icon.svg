<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d6e8f5"/>
      <stop offset="100%" style="stop-color:#b8d4ec"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a7a"/>
      <stop offset="100%" style="stop-color:#0f3260"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- CIMA C ring -->
  <circle cx="256" cy="210" r="90" fill="none" stroke="url(#accent)" stroke-width="28" stroke-dasharray="470 60" stroke-dashoffset="30" stroke-linecap="round"/>
  <circle cx="256" cy="210" r="44" fill="url(#accent)" opacity=".25"/>
  <circle cx="256" cy="210" r="22" fill="url(#accent)" opacity=".6"/>
  <!-- Box / clipboard (stock de insumos icon) -->
  <rect x="168" y="330" width="176" height="130" rx="12" fill="url(#accent)" opacity=".15" stroke="url(#accent)" stroke-width="10"/>
  <line x1="210" y1="365" x2="302" y2="365" stroke="#1a4a7a" stroke-width="10" stroke-linecap="round"/>
  <line x1="210" y1="398" x2="302" y2="398" stroke="#1a4a7a" stroke-width="10" stroke-linecap="round" opacity=".6"/>
  <line x1="210" y1="431" x2="265" y2="431" stroke="#1a4a7a" stroke-width="10" stroke-linecap="round" opacity=".35"/>
</svg>
