<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3aaaff"/>
      <stop offset="100%" stop-color="#0040c8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="elem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.50"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- ── MEDICAL CROSS — upper-left, translucent glass ── -->
  <g opacity="0.88">
    <!-- Outer glow ring (very subtle) -->
    <rect x="72" y="68" width="160" height="160" rx="32"
          fill="rgba(255,255,255,0.07)"/>
    <!-- Vertical arm -->
    <rect x="122" y="82" width="60" height="172" rx="18"
          fill="url(#elem)" stroke="rgba(255,255,255,0.30)" stroke-width="2"/>
    <!-- Horizontal arm -->
    <rect x="82" y="122" width="172" height="60" rx="18"
          fill="url(#elem)" stroke="rgba(255,255,255,0.30)" stroke-width="2"/>
    <!-- Inner highlight top-left -->
    <rect x="122" y="82" width="60" height="28" rx="14"
          fill="rgba(255,255,255,0.30)"/>
    <rect x="82" y="122" width="28" height="60" rx="14"
          fill="rgba(255,255,255,0.30)"/>
  </g>

  <!-- ── SYRINGE — lower-right, rotated -38°, translucent glass ── -->
  <g transform="rotate(-38, 330, 360)" opacity="0.88">
    <!-- Finger flanges -->
    <rect x="174" y="328" width="16" height="60" rx="7"
          fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.70)" stroke-width="2"/>
    <rect x="188" y="338" width="16" height="40" rx="7"
          fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.70)" stroke-width="2"/>
    <!-- Plunger rod -->
    <rect x="204" y="349" width="46" height="18" rx="6"
          fill="rgba(255,255,255,0.40)"/>
    <!-- Barrel -->
    <rect x="250" y="326" width="192" height="64" rx="14"
          fill="rgba(255,255,255,0.16)"
          stroke="rgba(255,255,255,0.82)" stroke-width="16"/>
    <!-- Barrel inner top highlight -->
    <rect x="250" y="328" width="192" height="16" rx="10"
          fill="rgba(255,255,255,0.18)"/>
    <!-- Graduation marks -->
    <line x1="300" y1="338" x2="300" y2="352"
          stroke="rgba(255,255,255,0.60)" stroke-width="8" stroke-linecap="round"/>
    <line x1="346" y1="338" x2="346" y2="352"
          stroke="rgba(255,255,255,0.60)" stroke-width="8" stroke-linecap="round"/>
    <line x1="392" y1="338" x2="392" y2="352"
          stroke="rgba(255,255,255,0.60)" stroke-width="8" stroke-linecap="round"/>
    <!-- Plunger stopper -->
    <rect x="252" y="332" width="20" height="52" rx="6"
          fill="rgba(255,255,255,0.42)"/>
    <!-- Tip cone -->
    <polygon points="442,326 442,390 472,358"
             fill="rgba(255,255,255,0.72)"/>
    <!-- Needle hub -->
    <rect x="472" y="352" width="18" height="12" rx="4"
          fill="rgba(255,255,255,0.82)"/>
    <!-- Needle -->
    <rect x="490" y="354" width="56" height="8" rx="4"
          fill="rgba(255,255,255,0.75)"/>
    <!-- Tip -->
    <polygon points="546,354 546,362 558,358"
             fill="rgba(255,255,255,0.70)"/>
  </g>
</svg>
